<!DOCTYPE html>

<html>
	<meta charset="utf-8"> 
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<head>
	<link rel="stylesheet" type="text/css" href="scripts/bootstrap/css/bootstrap.min.css">	
	<style> 
		body {
			margin-top: 30px;
     		overflow: hidden;
		}
		img {
			-webkit-user-select: none;
		}
		.stetho{
			cursor: url(assets/Stethoscope.png), auto;
		}
		.nostetho{
			cursor: auto;
		}
		#debug {
			padding: 10px 50px 10px 10px;	
			font-family: "Arial, Helvetica, sans-serif";
			font-size: 14px;
		}
		#btns {
			position:absolute;
			left: 470px;
			-webkit-user-select: none;
		}
				#alerts b {
			color: red;	
		}
		#alerts .t {
			color: green;	
		}
		
	</style>
</head>

<body>
	<audio id = "audio"  preload="auto" loop>
		<source src="S1S2_Apex.m4a" type="audio/mpeg" />
	 	<source src="S1S2_Apex.ogg" type="audio/ogg" />	
		Your browser does not support the audio element.
	</audio>
	
	<div id = "btns" class="btn-group btn-group-vertical">
		<button id="play" class="btn btn-success" onClick="PlayAudio();">New Patient</button>
		<br>
		<label>The condition is: </label>
	</div>
	<div id="bg"><img id="img" class="nostetho" src="assets/chest.png" width="573" height="855" alt="Patient"></div>
	<div id = "alerts" class="alert alert-info">
		<b><p>MAKE SURE AUDIO IS TURNED UP ON YOUR DEVICE.</p><p>Headphones recommended.</p></b> 
		<p id = "info"></p>
	</div>
	
	<p id = "debug"></p>
	
	<script type="text/javascript" src="https://code.jquery.com/jquery-1.9.1.js"></script>
	<script src="scripts/bootstrap/js/bootstrap.min.js"></script>
	<script type="text/javascript">
		var srcs = ["S1S2_Apex", "S1S2_Base", "S3", "S4", "Mechanical_Valve", "Murmur","Friction_Rub"];
		var defaulttxt = "Click <span class='t'>'New Patient'</span>, then touch and hold the patient's chest to listen to the heart sounds. Choose the corresponding condition."; 
		var listenCount = 0;
		var maxVolume = 0.8;
		var volume = maxVolume;
		var target = {x: 270, y: 270};
		var maxDist = 60;
		var audioobj;
		
		$(document).ready(function(){
			// instructions 
			$('#info').html(defaulttxt);
		
			// assign audio obj
			audioobj = $('#audio').get(0);
			audioobj.autoplay = false;
			
			// create buttons
			CreateBtns();
			
			// events
			$("#img").mousemove(function( e ) {		
				var pos = {x: e.pageX , y: e.pageY};
				GetDistance(pos);
				//console.log(pos);
				e.preventDefault();
			}); 
				
		});
		
		function CreateBtns() {
			for (var i = 0 ; i < srcs.length ; i ++ ) {
				var label = srcs[i].replace("_", " ");
				var $btn = $('<button/>', {
					text: label,
					id: i,
					class: 'btn btn-large',
					click: function (e) {
						$("button").removeClass('btn-primary');
							
						
							// check answer
							
							if (listenCount == 1){
								var file = e.target.innerHTML.replace(" ", "_");
								$(e.target).addClass('btn-primary');
								
								// correct choice
								if (audioobj.src.search(file) != -1) {
									$('#info').html("<span class='t'>Correct!</span> The Answer is " + e.target.innerHTML + ". <br><br>Click <span class='t'>'New Patient'</span> to load another file." );	
								} else {
									$('#info').html("<b>Incorrect!</b> Try again." );
								}
							} else {
								// user has not listened
								$('#info').html("You must listen to the heart sound before choosing. Touch and hold the patient's chest to listen to the heart sounds.");
							}
							
							// no audio file chosen yet
							if (audioobj.src.search(".m4a") == -1 && audioobj.src.search(".ogg") == -1) {
								console.log(audioobj.src.search(".m4a"));
								$('#info').html("Click <span class='t'>'New Patient'</span> first to load heart sound. ");	
								$("button").removeClass('btn-primary');
							} 
					}
				});	
				
				$('#btns').append($btn);
				
			}
			
			$("button").css("-webkit-user-select", "none");
			//$(".btn-large").css("visibility", "hidden");
			
		}
		
		function GetDistance(pos) {
			var dx = (target.x - pos.x) * (target.x - pos.x);
			var dy =  (target.y - pos.y) *  (target.y - pos.y);
			var d = Math.sqrt(dx + dy);
			
			if (d > 100) {
				audioobj.pause();
				$("#img").addClass("nostetho");
				$("#img").removeClass("stetho");
			}else {
				$("#img").removeClass("nostetho");
				$("#img").addClass("stetho");
				audioobj.play();
				listenCount = 1;
			}
		}
		
		function PlayAudio(){
			var i = Math.floor(Math.random() * (srcs.length - 1));
			var srcurl = "assets/" + srcs[i];
			srcurl += (audioobj.canPlayType('audio/ogg') === "")? ".m4a":".ogg";
			audioobj.src = srcurl;
			audioobj.pause();
			audioobj.load();	
			
			$('#info').html("Touch the patient's chest to listen to the heart sounds, then choose the corresponding condition.");	
			$("button").removeClass('btn-primary');		
			
			//reset feedback
			listenCount = 0;
			//$(".btn-large").css("visibility", "visible");	
		}
		
	</script>
</body>
</html>
